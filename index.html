<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nogori Dictionary | APM Universiti Malaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; }
        
        .nogori-header { 
            background: linear-gradient(90deg, #dc2626 0%, #facc15 100%); 
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .btn-speak {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-speak:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3); 
        }

        #outputText::-webkit-scrollbar { width: 6px; }
        #outputText::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="nogori-header text-white shadow-xl relative overflow-hidden">
        <div class="max-w-6xl mx-auto px-6 py-8 flex items-center justify-between relative z-10">
            <div class="flex items-center gap-4">
                <div class="h-14 w-14 bg-white rounded-full flex items-center justify-center shadow-lg p-2">
					<img src="images/image_name.png" alt="UM Logo" class="h-10 w-auto">
                </div>
                <div class="hidden md:block border-l border-white/30 pl-4">
                    <p class="text-[10px] font-bold tracking-widest opacity-80 uppercase">Akademi Pengajian Melayu</p>
                    <p class="text-lg font-extrabold leading-none">Universiti Malaya</p>
                </div>
            </div>

            <div class="text-center">
                <h1 class="text-2xl md:text-4xl font-black tracking-tighter uppercase italic">Nogori Dictionary</h1>
            </div>

            <div class="flex items-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Flag_of_Negeri_Sembilan.svg/1200px-Flag_of_Negeri_Sembilan.svg.png" 
                     alt="Bendera" class="h-10 md:h-14 rounded shadow-md">
            </div>
        </div>
    </header>

    <main class="w-full flex-grow flex flex-col items-center justify-start p-4 md:p-10">
    <div class="glass-card rounded-[2.5rem] shadow-2xl p-6 md:p-10 w-full max-w-5xl">
        
        <div class="flex justify-center w-full mb-10">
            <div class="flex flex-col items-center">
                <button id="exchangeBtn" onclick="swapLanguages()" 
                    class="group flex items-center justify-between gap-8 bg-white px-10 py-5 rounded-2xl border-2 border-slate-100 shadow-sm hover:shadow-md transition-all active:scale-95 cursor-pointer min-w-[320px] md:min-w-[450px]">
                    
                    <div id="langBM" class="flex flex-col items-center w-32 md:w-40">
                        <span class="text-[10px] font-bold text-slate-400">DARI</span>
                        <div class="text-xs md:text-sm font-black text-slate-600 transition-all duration-300">BAHASA MELAYU</div>
                        <div id="indicatorBM" class="h-1 w-full bg-transparent rounded-full mt-1"></div>
                    </div>

                    <div class="bg-slate-50 p-2 rounded-full group-hover:bg-yellow-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400 group-hover:text-yellow-600 transition-transform duration-500 group-hover:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        </svg>
                    </div>

                    <div id="langNogori" class="flex flex-col items-center opacity-30 w-32 md:w-40">
                        <span class="text-[10px] font-bold text-slate-400">KE</span>
                        <div class="text-xs md:text-sm font-black text-slate-600 transition-all duration-300">DIALEK NOGORI</div>
                        <div id="indicatorNogori" class="h-1 w-full bg-transparent rounded-full mt-1"></div>
                    </div>
                </button>
                
                <p class="text-[9px] text-slate-400 mt-2 font-bold tracking-widest uppercase">KLIK UNTUK TUKAR ARAH</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Input Teks</label>
                <textarea id="inputText" 
                    class="w-full h-64 p-8 bg-slate-50 border-2 border-slate-100 rounded-[2rem] focus:border-yellow-400 focus:bg-white outline-none text-xl leading-relaxed transition-all shadow-inner resize-none"
                    placeholder="Taip di sini..."></textarea>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Hasil Terjemahan</label>
                <div id="outputText" 
                    class="w-full h-64 p-8 bg-rose-50/30 border-2 border-rose-100 rounded-[2rem] text-rose-900 text-xl leading-relaxed overflow-y-auto font-semibold shadow-sm">
                    Menunggu input...
                </div>
            </div>
        </div>

        <div class="mt-10 flex flex-col md:flex-row items-center justify-center gap-4">
            <button onclick="terjemah()" class="btn-speak bg-yellow-500 text-white font-bold py-5 px-14 rounded-full flex items-center gap-3 shadow-xl active:scale-95">
                <span>Terjemah</span>
            </button>

            <button onclick="speakText()" class="btn-speak bg-rose-600 text-white font-bold py-5 px-14 rounded-full flex items-center gap-3 shadow-xl active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 5.05 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                </svg>
                <span>Donga Suaro</span>
            </button>
        </div>
    </div>
</main>

    <footer class="text-center py-4 text-slate-200 text-[10px] font-bold tracking-widest uppercase">
        &copy; 2026 Akademi Pengajian Melayu - Universiti Malaya
    </footer>

    <script>
    const dataset = {
        "saya": "eden", "aku": "ese", "awak": "ekau", "dia": "dio", "mereka": "dongan eigho", "kita": "kito",
        "lelaki": "jang", "perempuan": "noli", "ayah": "abah", "ibu": "omak", "kakak": "kak yong",
        "pergi": "poei", "suka": "suko", "tengah": "tongah", "buat": "buek", "balik": "bolik", "lari": "mencanak", 
        "datang": "mai", "tengok": "ngintai", "tidur": "lotap", "jatuh": "tonggolek", "marah": "berongot", 
        "cakap": "cekak", "bohong": "mongak", "sembunyi": "nyorok", "sepak": "terajang", "makan": "makan", 
        "minum": "minum", "siap": "siap", "sangat": "bona", "comel": "mencuek", "kenyang": "muntil", 
        "lapar": "kobulaghun", "penat": "ghonyeh", "busuk": "kohong", "hancing": "kohon", "basah": "lopoh", 
        "panas": "ongap", "sejuk": "kodoghit", "cepat": "copek", "lambat": "lembab", "pening": "pening lolek", 
        "berani": "poghochak", "ke": "kek", "di": "kek", "daripada": "daghi", "kenapa": "apo kobandonyo", 
        "bagaimana": "camno", "apa": "apo", "siapa": "siapo", "mana": "mano", "tidak": "ndak", "tak": "ndak", 
        "duit": "pitis", "sekarang": "sakni", "tadi": "moghian", "esok": "isok", "nanti": "kaghang"
    };

    // Create the reverse dictionary for Nogori -> BM
    const kamusTerbalik = {};
    for (let key in dataset) {
        if (!kamusTerbalik[dataset[key]]) {
            kamusTerbalik[dataset[key]] = key;
        }
    }

    // STATE: false = BM to Nogori | true = Nogori to BM
    let isNogoriSource = false;

    function swapLanguages() {
        isNogoriSource = !isNogoriSource;
        
        // UI Elements
        const langBM = document.getElementById('langBM');
        const langNogori = document.getElementById('langNogori');
        const indBM = document.getElementById('indicatorBM');
        const indNogori = document.getElementById('indicatorNogori');
        const inputField = document.getElementById('inputText');

        if (isNogoriSource) {
            // Nogori is now the Source (Left)
            langBM.classList.add('opacity-30');
            langNogori.classList.remove('opacity-30');
            indBM.classList.replace('bg-rose-600', 'bg-transparent');
            indNogori.classList.replace('bg-transparent', 'bg-yellow-500');
            inputField.placeholder = "Taip dlm Dialek Nogori...";
        } else {
            // BM is now the Source (Left)
            langBM.classList.remove('opacity-30');
            langNogori.classList.add('opacity-30');
            indBM.classList.replace('bg-transparent', 'bg-rose-600');
            indNogori.classList.replace('bg-yellow-500', 'bg-transparent');
            inputField.placeholder = "Taip dlm Bahasa Melayu...";
        }

        // Auto-retranslate if there is already text
        if(inputField.value.trim() !== "") {
            terjemah();
        }
    }

    function terjemah() {
        const input = document.getElementById('inputText').value;
        const outputDiv = document.getElementById('outputText');

        if (!input.trim()) {
            outputDiv.innerText = "Menunggu input...";
            return;
        }

        // Choose dictionary based on active state
        let kamusAktif = isNogoriSource ? kamusTerbalik : dataset;

        let hasil = input.replace(/\b(\w+)\b/g, (match) => {
            let clean = match.toLowerCase();
            if (kamusAktif[clean]) {
                let target = kamusAktif[clean];
                // Capitalization preservation
                if (match === match.toUpperCase()) return target.toUpperCase();
                if (match[0] === match[0].toUpperCase()) return target.charAt(0).toUpperCase() + target.slice(1);
                return target;
            }
            return match;
        });

        outputDiv.innerText = hasil;
    }

    function speakText() {
    const teks = document.getElementById('outputText').innerText;
    
    if (!teks || teks === "Menunggu input...") return;

    // Check if we are currently outputting Nogori (isNogoriSource is false means input=BM, output=Nogori)
    if (isNogoriSource === false) {
        // --- NOGORI AUDIO LOGIC ---
        // Get the first word of the result (e.g., "Eden")
        const words = teks.toLowerCase().match(/\b(\w+)\b/g);
        if (!words) return;
        
        const firstWord = words[0];
        const audioPath = `audio/${firstWord}.mp3`;
        const audio = new Audio(audioPath);

        audio.play().catch(error => {
            console.error("Audio file not found:", audioPath);
            // Fallback to system voice if MP3 is missing
            useSystemVoice(teks);
        });
    } else {
        // --- STANDARD BM SYSTEM VOICE ---
        useSystemVoice(teks);
    }
}

// Helper function for the system voice
function useSystemVoice(teks) {
    const synth = window.speechSynthesis;
    const utter = new SpeechSynthesisUtterance(teks);
    const voices = synth.getVoices();
    const malayVoice = voices.find(v => v.lang.includes('ms') || v.lang.includes('MY')) 
                    || voices.find(v => v.lang.includes('id') || v.lang.includes('ID'));
    if (malayVoice) utter.voice = malayVoice;
    utter.lang = 'ms-MY';
    utter.rate = 0.9;
    synth.cancel();
    synth.speak(utter);
}
</script>
</body>
</html>
